<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Presentations</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0e1a;
      --surface: #111827;
      --surface-hover: #1a2035;
      --border: rgba(255,255,255,0.07);
      --accent: #6366f1;
      --accent-glow: rgba(99,102,241,0.25);
      --text: #f1f5f9;
      --text-muted: #64748b;
      --text-dim: #94a3b8;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
    }

    /* ── Background texture ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% -10%, rgba(99,102,241,0.12) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 110%, rgba(139,92,246,0.08) 0%, transparent 55%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 1100px;
      margin: 0 auto;
      padding: 80px 24px 120px;
    }

    /* ── Hero ── */
    .hero {
      text-align: center;
      padding: 60px 0 72px;
    }

    .hero-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      background: rgba(99,102,241,0.1);
      border: 1px solid rgba(99,102,241,0.25);
      padding: 5px 12px;
      border-radius: 100px;
      margin-bottom: 24px;
    }

    .hero-eyebrow svg { flex-shrink: 0; }

    .hero h1 {
      font-size: clamp(2.4rem, 6vw, 3.8rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.1;
      margin-bottom: 16px;
      background: linear-gradient(135deg, #f1f5f9 30%, #94a3b8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero p {
      font-size: 1.1rem;
      color: var(--text-muted);
      max-width: 520px;
      margin: 0 auto;
    }

    /* ── Stats bar ── */
    .stats {
      display: flex;
      justify-content: center;
      gap: 40px;
      margin-bottom: 64px;
    }

    .stat { text-align: center; }
    .stat-value {
      font-size: 2rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.03em;
    }
    .stat-label {
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-top: 2px;
    }

    /* ── Section header ── */
    .section-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
    }

    .section-header h2 {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .section-header::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── Grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
      text-decoration: none;
      color: inherit;
      transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
      display: flex;
      flex-direction: column;
      gap: 10px;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 16px;
      opacity: 0;
      background: radial-gradient(circle at 50% 0%, var(--accent-glow), transparent 70%);
      transition: opacity 0.3s ease;
    }

    .card:hover {
      transform: translateY(-3px);
      border-color: rgba(99,102,241,0.35);
      box-shadow: 0 8px 40px rgba(99,102,241,0.12), 0 2px 8px rgba(0,0,0,0.3);
      background: var(--surface-hover);
    }

    .card:hover::before { opacity: 1; }

    .card-icon {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      background: rgba(99,102,241,0.12);
      border: 1px solid rgba(99,102,241,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 4px;
    }

    .card-icon svg { color: var(--accent); }

    .card-name {
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.01em;
    }

    .card-meta {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.8rem;
      color: var(--text-muted);
      font-family: 'JetBrains Mono', monospace;
    }

    .card-desc {
      font-size: 0.875rem;
      color: var(--text-muted);
      line-height: 1.55;
      flex: 1;
    }

    .card-arrow {
      margin-top: 4px;
      color: var(--text-muted);
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      gap: 4px;
      transition: color 0.2s, gap 0.2s;
    }

    .card:hover .card-arrow {
      color: var(--accent);
      gap: 8px;
    }

    /* ── Empty state ── */
    .empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }

    /* ── Footer ── */
    footer {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 40px 24px;
      border-top: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 0.82rem;
      margin-top: 80px;
    }

    footer a { color: var(--text-dim); text-decoration: none; }
    footer a:hover { color: var(--accent); }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      .hero { padding: 40px 0 56px; }
      .stats { gap: 24px; }
      .stat-value { font-size: 1.6rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Hero -->
    <section class="hero">
      <div class="hero-eyebrow">
        <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
          <circle cx="5" cy="5" r="4" stroke="currentColor" stroke-width="1.5"/>
          <circle cx="5" cy="5" r="1.5" fill="currentColor"/>
        </svg>
        Personal Slide Hub
      </div>
      <h1>Presentations</h1>
      <p>A collection of talks and decks — authored in HTML, published via GitHub Pages.</p>
    </section>

    <!-- Stats -->
    <div class="stats">
      <div class="stat">
        <div class="stat-value" id="count">—</div>
        <div class="stat-label">Presentation<span id="plural"></span></div>
      </div>
      <div class="stat">
        <div class="stat-value" id="slides-count">—</div>
        <div class="stat-label">Total Slide<span id="slides-plural"></span></div>
      </div>
    </div>

    <!-- Grid -->
    <div class="section-header"><h2>All Presentations</h2></div>
    <div class="grid" id="grid"></div>

    <!-- Empty state -->
    <div class="empty" id="empty" style="display:none">
      <p>No presentations yet. Add a folder to <code>presentations/</code> and push to main.</p>
    </div>
  </div>

  <footer>
    Published with <a href="https://pages.github.com">GitHub Pages</a> &mdash;
    <a href="https://github.com/jakobgetz/presentations">View source</a>
  </footer>

  <script>
    const presentations = [
      {
        name: 'Transformers',
        desc: 'Self-attention, encoder/decoder blocks, and scalable training pipelines.',
        icon: `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>`,
        href: 'presentations/transformers/',
        slides: 4
      }
    ];

    function render() {
      const grid = document.getElementById('grid');
      const empty = document.getElementById('empty');
      const countEl = document.getElementById('count');
      const slidesCountEl = document.getElementById('slides-count');
      const plural = document.getElementById('plural');
      const slidesPlural = document.getElementById('slides-plural');

      countEl.textContent = presentations.length;
      plural.textContent = presentations.length !== 1 ? 's' : '';
      const totalSlides = presentations.reduce((s, p) => s + (p.slides || 0), 0);
      slidesCountEl.textContent = totalSlides;
      slidesPlural.textContent = totalSlides !== 1 ? 's' : '';

      if (!presentations.length) {
        grid.style.display = 'none';
        empty.style.display = 'block';
        return;
      }

      grid.innerHTML = presentations.map(p => `
        <a href="${p.href}" class="card">
          <div class="card-icon">${p.icon}</div>
          <div class="card-name">${p.name}</div>
          <div class="card-meta">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
            ${p.slides || '?'} slides
          </div>
          <div class="card-desc">${p.desc}</div>
          <div class="card-arrow">
            Open presentation
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
          </div>
        </a>
      `).join('');
    }

    render();
  </script>
</body>
</html>
